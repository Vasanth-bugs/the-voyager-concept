<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Clone Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="custom-cursor"></div>

    <header class="hero">
        <div class="hero-content">
            <h1>THE VOYAGER.</h1>
            <p>Scroll to explore the engineering.</p>
        </div>
    </header>

    <section class="sticky-track">
        
        <div class="sticky-container">
            
            <div class="cinematic-bg"></div>

            <div class="glass-card">
                <h2>All-Terrain Mastery</h2>
                <p>Designed for the harsh light and long shadows of the open road.</p>
                <ul class="specs">
                    <li><strong>0-60:</strong> 3.8s</li>
                    <li><strong>Drivetrain:</strong> AWD</li>
                </ul>
            </div>

            <div class="scroll-text-container">
                <h3 class="cinematic-text text-1">Uncompromising Power.</h3>
                <h3 class="cinematic-text text-2">Sculpted aerodynamics.</h3>
                <h3 class="cinematic-text text-3">Arrive in silence.</h3>
            </div>
            
        </div>

        <div class="tripwire" data-target=".text-1"></div>
        <div class="tripwire" data-target=".text-2"></div>
        <div class="tripwire" data-target=".text-3"></div>

    </section>

    <footer class="footer">
        <h2>Reserve Yours</h2>
    </footer>

    <script src="script.js"></script>

</body>
</html>
